name: Supabase E2E

# Track 5 of docs/checkpoint-hardening-plan.md: real-DB integration tests.
#
# On every PR and every push to main: spin up a local Supabase stack
# (via `supabase start`, which uses Docker), apply all migrations from
# supabase/migrations/, then run the E2E test suite. Catches schema
# drift (drift canary) and verifies the confirm_checkpoint_write RPC
# end-to-end in a real Postgres instance.
#
# No prod credentials needed — tests run against ephemeral local DB.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Local Supabase E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Extract Supabase credentials
        id: creds
        run: |
          echo "=== Raw supabase status output ==="
          supabase status
          echo "=== supabase status -o env ==="
          supabase status -o env
          echo "=== End debug ==="

          # Parse the --output=env format. Values are quoted. Strip the
          # quotes after extracting so GITHUB_ENV gets clean values.
          STATUS=$(supabase status -o env)

          API_URL=$(echo "$STATUS" | grep -E '^API_URL=' | cut -d= -f2- | tr -d '"')
          SERVICE_ROLE=$(echo "$STATUS" | grep -E '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')

          if [ -z "$API_URL" ]; then
            echo "ERROR: API_URL not found in supabase status output"
            exit 1
          fi
          if [ -z "$SERVICE_ROLE" ]; then
            echo "ERROR: SERVICE_ROLE_KEY not found in supabase status output"
            exit 1
          fi

          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE" >> "$GITHUB_ENV"
          echo "Extracted NEXT_PUBLIC_SUPABASE_URL=$API_URL"
          echo "Extracted SERVICE_ROLE_KEY (masked)"

      - name: Run E2E tests
        env:
          # Non-secret placeholder for build-time env expectations.
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-not-used-in-e2e"
        run: npm run test:e2e

      - name: Stop local Supabase (cleanup)
        if: always()
        run: supabase stop --no-backup
