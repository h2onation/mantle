<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0C0B0A" />
  <title>mywalnut — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #F4F0EA;
      color: #1A1614;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin-bottom: 24px;
      opacity: 0.35;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #6B6360;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 32px;
    }
    button {
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #F4F0EA;
      background: #5E7054;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#1A1614" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <circle cx="12" cy="20" r="1" fill="#1A1614" stroke="none"/>
  </svg>
  <h1>You're offline</h1>
  <p>Sage needs a connection to think. Check your signal and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
